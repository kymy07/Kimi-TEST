<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saya Hensem Tak? 💍</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffb3c6 0%, #ffc8dd 40%, #ffafcc 70%, #ffd6e0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* SPLASH */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #ff6bab 0%, #ff85c1 50%, #ffb3d9 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 1.4rem;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  #splash.hidden {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }

  .splash-emoji {
    font-size: 5rem;
    animation: floatBob 2s ease-in-out infinite;
  }

  @keyframes floatBob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  .splash-title {
    font-family: 'Pacifico', cursive;
    font-size: 1.8rem;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.12);
    text-align: center;
    padding: 0 1.5rem;
    line-height: 1.3;
  }

  .splash-sub {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.9);
    font-weight: 700;
    text-align: center;
    padding: 0 2rem;
  }

  .splash-player {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 1.2rem 1.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
    border: 1.5px solid rgba(255,255,255,0.4);
    width: 280px;
  }

  .player-song {
    font-size: 0.9rem;
    font-weight: 800;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .note-anim {
    font-size: 1.2rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .note-anim.show {
    opacity: 1;
    animation: noteBounce 0.6s ease infinite alternate;
  }
  @keyframes noteBounce {
    from { transform: translateY(0) rotate(-8deg); }
    to   { transform: translateY(-6px) rotate(8deg); }
  }

  .play-btn {
    background: #fff;
    border: none;
    border-radius: 50%;
    width: 56px;
    height: 56px;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d63384;
    box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    animation: pulseBtn 1.3s ease-in-out infinite;
    transition: transform 0.15s;
  }

  @keyframes pulseBtn {
    0%, 100% { transform: scale(1);    box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
    50%       { transform: scale(1.1);  box-shadow: 0 8px 28px rgba(0,0,0,0.22); }
  }

  .play-btn.playing { animation: none; }
  .play-btn:active  { transform: scale(0.95); }

  .vol-slider {
    -webkit-appearance: none;
    width: 110px;
    height: 5px;
    border-radius: 5px;
    background: rgba(255,255,255,0.5);
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 1px 6px rgba(0,0,0,0.2);
  }

  .splash-hint {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.8);
    font-weight: 700;
    text-align: center;
  }

  /* HEARTS BG */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart-float {
    position: absolute;
    opacity: 0.35;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(100vh) rotate(0deg);  opacity: 0.4; }
    100% { transform: translateY(-120px) rotate(20deg); opacity: 0; }
  }

  /* MAIN APP */
  #app {
    width: 100%;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.9s ease 0.2s;
  }

  #app.visible { opacity: 1; }

  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 2.5rem 2rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(255,150,180,0.28);
  }

  .ring-emoji {
    font-size: 68px;
    display: block;
    margin-bottom: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.08); }
  }

  .question {
    font-family: 'Pacifico', cursive;
    font-size: 2.1rem;
    color: #d63384;
    margin-bottom: 0.4rem;
    line-height: 1.25;
  }

  .sub {
    font-size: 1rem;
    color: #c46b8a;
    font-weight: 600;
    margin-bottom: 1.4rem;
  }

  .video-wrap {
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    border: 3px solid #ffb3c6;
  }

  .video-wrap img,
  .video-wrap video {
    width: 100%;
    display: block;
    max-height: 210px;
    object-fit: cover;
  }

  .buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    min-height: 80px;
  }

  .btn-yes {
    background: linear-gradient(135deg, #51cf66, #2f9e44);
    color: #fff;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(81,207,102,0.4);
    transition: transform 0.2s, font-size 0.4s, padding 0.4s;
  }

  .btn-yes:hover { transform: scale(1.05); }

  .btn-no {
    background: linear-gradient(135deg, #fa5252, #c0392b);
    color: #fff;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(250,82,82,0.4);
  }

  .btn-no.running {
    position: fixed;
    transition: left 0.15s ease, top 0.15s ease;
    z-index: 999;
  }

  .plead-msg {
    font-size: 1rem;
    color: #d63384;
    font-weight: 700;
    margin-top: 0.8rem;
    min-height: 28px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .yes-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .yes-screen.active { display: flex; }

  .yes-screen h2 {
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    color: #d63384;
  }

  .yes-screen p {
    color: #c46b8a;
    font-weight: 700;
    font-size: 1.05rem;
  }

  .confetti-emoji {
    font-size: 3rem;
    animation: bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }

  /* Mini music bar */
  .music-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 0.45rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    box-shadow: 0 4px 20px rgba(255,120,160,0.25);
    z-index: 100;
    border: 1.5px solid #ffb3c6;
    opacity: 0;
    transition: opacity 0.5s ease 0.5s;
  }

  .music-bar.visible { opacity: 1; }

  .music-note {
    font-size: 1.1rem;
    animation: noteSpin 1.5s ease-in-out infinite alternate;
  }
  @keyframes noteSpin {
    from { transform: rotate(-8deg); }
    to   { transform: rotate(8deg); }
  }

  .music-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: #d63384;
    white-space: nowrap;
  }

  .music-toggle {
    background: linear-gradient(135deg, #ffb3c6, #ff6b9d);
    border: none;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <span class="splash-emoji">💍</span>
  <div class="splash-title">Ada something nak tunjuk ni...</div>
  <div class="splash-sub">Play lagu dulu sebelum proceed tau 🎵</div>

  <div class="splash-player">
    <div class="player-song">
      <span class="note-anim" id="noteL">🎵</span>
      🎶 JB.mp3
      <span class="note-anim" id="noteR">🎵</span>
    </div>
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
    <input class="vol-slider" type="range" min="0" max="1" step="0.05" value="0.7" oninput="setVol(this.value)"/>
  </div>

  <div class="splash-hint" id="splashHint">Tekan ▶ untuk play lagu dulu 🥺</div>
</div>

<!-- HEARTS BG -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- MAIN APP -->
<div id="app">
  <div class="card">
    <div id="mainContent">
      <span class="ring-emoji">💍</span>
      <div class="question">Saya hensem tak?</div>
      <div class="sub">Jaga-jaga eh, jangan cakap no tauuu</div>

      <div class="video-wrap">
        <img src="panda_vid1.gif" alt="panda comel"/>
      </div>

      <div class="buttons" id="btnArea">
        <button class="btn-yes" id="btnYes" onclick="clickYes()">Yes! 💕</button>
        <button class="btn-no"  id="btnNo"  onclick="clickNo()">No</button>
      </div>
      <div class="plead-msg" id="pleadMsg"></div>
    </div>

    <div class="yes-screen" id="yesScreen">
      <span style="font-size:5rem;">🎉</span>
      <h2>Yeahhh, so nanti tunggu saya hantar rombongan pulak ehh HAHAHAHAHA</h2>
      <span class="confetti-emoji">💖</span>
      <p>MUAH CIKITTTT HAHAHAHAHA 🥹✨</p>
      <p style="font-size:0.9rem;margin-top:-0.5rem;">I love youuuu 🎊</p>
    </div>
  </div>
</div>

<!-- Mini music bar -->
<div class="music-bar" id="musicBar">
  <span class="music-note">🎵</span>
  <span class="music-label">JB.mp3 🎶</span>
  <button class="music-toggle" id="miniToggle" onclick="miniToggle()">⏸</button>
</div>

<audio id="bgMusic" loop src="JB.mp3"></audio>

<script>
  const audio      = document.getElementById('bgMusic');
  const playBtn    = document.getElementById('playBtn');
  const splash     = document.getElementById('splash');
  const app        = document.getElementById('app');
  const musicBar   = document.getElementById('musicBar');
  const noteL      = document.getElementById('noteL');
  const noteR      = document.getElementById('noteR');
  const splashHint = document.getElementById('splashHint');

  let isPlaying  = false;
  let splashDone = false;

  audio.volume = 0.7;

  function setVol(v) { audio.volume = parseFloat(v); }

  function togglePlay() {
    if (!isPlaying) {
      audio.play().then(() => {
        isPlaying = true;
        playBtn.textContent = '⏸';
        playBtn.classList.add('playing');
        noteL.classList.add('show');
        noteR.classList.add('show');
        splashHint.textContent = '🎶 Siap! Tunggu sekejap... 🥰';

        // Dismiss splash after 2.5s
        setTimeout(dismissSplash, 2500);
      }).catch(() => {
        splashHint.textContent = 'Cuba lagi sekali 😅';
      });
    } else {
      audio.pause();
      isPlaying = false;
      playBtn.textContent = '▶';
      playBtn.classList.remove('playing');
      noteL.classList.remove('show');
      noteR.classList.remove('show');
      splashHint.textContent = 'Tekan ▶ untuk play lagu dulu 🥺';
    }
  }

  function dismissSplash() {
    if (splashDone) return;
    splashDone = true;

    splash.classList.add('hidden');
    setTimeout(() => { splash.style.display = 'none'; }, 700);

    app.classList.add('visible');
    musicBar.classList.add('visible');
    spawnHearts(12, ['💕','💖','✨','🌸','💗','🌷']);
  }

  function miniToggle() {
    const btn = document.getElementById('miniToggle');
    if (!audio.paused) {
      audio.pause();
      btn.textContent = '▶';
    } else {
      audio.play();
      btn.textContent = '⏸';
    }
  }

  // ── Game logic ──
  const pleads = [
    "Pleaseeeee, saya hensem kann?? 🥺👉👈",
    "Come on... I love you so much!! 💔",
    "PRETTY PLEASE, saya hensem kannn?? !! 🙏😭"
  ];

  let noCount = 0;
  let hoverActive = false;

  const btnNo    = document.getElementById('btnNo');
  const btnYes   = document.getElementById('btnYes');
  const pleadMsg = document.getElementById('pleadMsg');

  btnNo.addEventListener('mouseenter', () => {
    if (!hoverActive) return;
    const vw = window.innerWidth, vh = window.innerHeight;
    const bw = btnNo.offsetWidth,  bh = btnNo.offsetHeight;
    const pad = 24;
    btnNo.style.left = Math.random() * (vw - bw - pad*2) + pad + 'px';
    btnNo.style.top  = Math.random() * (vh - bh - pad*2) + pad + 'px';
  });

  function clickNo() {
    if (noCount >= 3) return;
    pleadMsg.style.animation = 'none';
    void pleadMsg.offsetWidth;
    pleadMsg.style.animation = 'fadeIn 0.4s ease';
    pleadMsg.textContent = pleads[noCount];
    noCount++;

    const sizes = [
      { fs: '1.3rem', pad: '0.9rem 2.5rem' },
      { fs: '1.6rem', pad: '1.1rem 3rem'   },
      { fs: '2rem',   pad: '1.3rem 3.5rem' }
    ];
    btnYes.style.fontSize = sizes[noCount-1].fs;
    btnYes.style.padding  = sizes[noCount-1].pad;

    if      (noCount === 1) btnNo.textContent = 'Sumpah ah tak hensem?';
    else if (noCount === 2) btnNo.textContent = 'Srs niiii???';
    else if (noCount === 3) {
      btnNo.textContent = 'Betul2 yakin ehh';
      const rect = btnNo.getBoundingClientRect();
      btnNo.classList.add('running');
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top  = rect.top  + 'px';
      hoverActive = true;
    }
  }

  function clickYes() {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('yesScreen').classList.add('active');
    launchHearts();
  }

  function spawnHearts(count, emojis) {
    const bg = document.getElementById('heartsBg');
    for (let i = 0; i < count; i++) {
      const h = document.createElement('span');
      h.className   = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left              = Math.random() * 100 + '%';
      h.style.fontSize          = (12 + Math.random() * 18) + 'px';
      h.style.animationDuration = (4 + Math.random() * 5) + 's';
      h.style.animationDelay    = (Math.random() * 4) + 's';
      bg.appendChild(h);
    }
  }

  function launchHearts() {
    document.getElementById('heartsBg').innerHTML = '';
    spawnHearts(25, ['💖','💗','💓','💝','✨','🌹','🎊','💍']);
  }
</script>

</body>
</html>
